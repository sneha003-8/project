<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  background: linear-gradient(to bottom, #1a0000, #330000);
  color: white;
  font-family: Arial;
  text-align: center;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  flex-direction: column;
  overflow: hidden;
}

button {
  padding: 12px 20px;
  margin: 10px;
  font-size: 18px;
  border-radius: 10px;
  border: none;
  cursor: pointer;
}

.yes { background: #ff4d6d; color: white; }
.no { background: gray; color: white; }

#message {
  max-width: 90%;
}

.final-text {
  font-size: 20px;
  line-height: 1.8;
  text-align: center;
  padding: 10px;
}

video {
  width: 85%;
  border-radius: 10px;
}

.heart, .cry {
  position: absolute;
  animation: fall 5s linear;
}

@keyframes fall {
  0% { transform: translateY(-10vh); opacity: 1; }
  100% { transform: translateY(100vh); opacity: 0; }
}
</style>
</head>

<body>

<h2 id="message">Tap to Start ❤️</h2>
<button id="startBtn">Start</button>

<div id="choice" style="display:none;">
  <p>Want to Visit The Memories??? 🌹</p>
  <button class="yes" onclick="startVideos()">Yes</button>
  <button class="no" onclick="sadMode()">No</button>
</div>

<audio id="audio" src="audio.mp3" preload="auto"></audio>
<audio id="bgMusic" src="music.mp3" preload="auto" loop></audio>

<video id="v1" src="video1.mp4" style="display:none;"></video>
<video id="v2" src="video2.mp4" style="display:none;"></video>

<script>
const startBtn = document.getElementById("startBtn");
const audio = document.getElementById("audio");
const message = document.getElementById("message");
const choice = document.getElementById("choice");
const v1 = document.getElementById("v1");
const v2 = document.getElementById("v2");
const bgMusic = document.getElementById("bgMusic");

// START
startBtn.onclick = async () => {
  startBtn.style.display = "none";
  message.innerText = "Listen Carefully ❤️";

  try {
    await audio.play();
  } catch {
    message.innerText = "Tap Again ❤️";
    startBtn.style.display = "block";
  }
};

// AFTER AUDIO → QUESTION
audio.onended = () => {
  message.innerText = "";
  choice.style.display = "block";
};

// YES FLOW
function startVideos() {
  choice.style.display = "none";

  v1.style.display = "block";
  v1.play();

  v1.onended = () => {
    v1.style.display = "none";
    v2.style.display = "block";
    v2.play();
  };

  v2.onended = () => {
    v2.style.display = "none";
    setTimeout(showFinal, 800);
  };
}

// FINAL MESSAGE
function showFinal() {
  // critical fix
  v1.pause();
  v2.pause();

  message.innerHTML = `
    <div class="final-text">
      I've been planning this for a while,<br><br>
      just to show you how important you are to me...<br><br>

      I wish you all the happiness in the world.<br>
      May all your dreams come true.<br><br>

      I love you, Humam.<br>
      I love you a lot... 💜💙
    </div>
  `;

  playMusic();
  heartEffect();
}

// NO FLOW
function sadMode() {
  choice.style.display = "none";
  message.innerText = "I'm Sad...!!! 🥺";
  cryEffect();
}

// MUSIC (FIXED PROPERLY)
function playMusic() {
  bgMusic.volume = 0;

  bgMusic.play().then(() => {
    let v = 0;
    let fade = setInterval(() => {
      if (v < 0.6) {
        v += 0.03;
        bgMusic.volume = v;
      } else clearInterval(fade);
    }, 200);
  }).catch(() => {
    message.innerHTML += "<br><br><small>Tap screen for music 🎵</small>";

    document.body.onclick = () => {
      bgMusic.play();
      document.body.onclick = null;
    };
  });
}

// HEART EFFECT
function heartEffect() {
  let count = 0;

  let interval = setInterval(() => {
    if (count > 40) return clearInterval(interval);

    let h = document.createElement("div");
    h.className = "heart";
    h.innerText = "❤";
    h.style.left = Math.random() * 100 + "vw";
    h.style.fontSize = (Math.random() * 20 + 10) + "px";

    document.body.appendChild(h);
    setTimeout(() => h.remove(), 5000);

    count++;
  }, 300);
}

// CRY EFFECT
function cryEffect() {
  let count = 0;

  let interval = setInterval(() => {
    if (count > 40) return clearInterval(interval);

    let c = document.createElement("div");
    c.className = "cry";
    c.innerText = "😭";
    c.style.left = Math.random() * 100 + "vw";
    c.style.fontSize = (Math.random() * 25 + 15) + "px";

    document.body.appendChild(c);
    setTimeout(() => c.remove(), 5000);

    count++;
  }, 200);
}
</script>

</body>
</html>
